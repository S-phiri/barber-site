<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BBIT — Dashboards (Print)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { background: var(--bg); }
    body { margin: 0; }
    .print-page {
      width: 1360px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }
    .print-page + .print-page { margin-top: 40px; }

    /* Disable hover anims, pings, drifts, stagger opacity in print */
    .enter { opacity: 1 !important; transform: none !important; animation: none !important; }
    .dot-live::after { animation: none !important; display: none !important; }
    .stamp.filled, .stamp.next { animation: none !important; }
    .hero-appt::before { animation: none !important; }
    .foil { animation: none !important; background-position: 0 0 !important; }
    * { transition: none !important; }

    @page { size: 1440px 1900px; margin: 0; }
    @media print {
      html, body { background: var(--bg) !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .print-page { page-break-after: always; break-after: page; margin: 0 auto !important; padding-top: 0; }
      .print-page:last-child { page-break-after: auto; break-after: auto; }
      .nav { position: static !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
      .card, .hero-appt { break-inside: avoid; page-break-inside: avoid; }
      .toast-wrap { display: none !important; }
    }
  </style>
</head>
<body data-theme="dark">
  <div id="barber-root" class="print-page"></div>
  <div id="customer-root" class="print-page"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/BarberDashboard.jsx"></script>
  <script type="text/babel" src="components/CustomerDashboard.jsx"></script>

  <script type="text/babel">
    const PrintShell = ({label, children}) => (
      <>
        <nav className="nav" style={{position:'static'}}>
          <div className="nav-left"><div className="brand">BBIT</div></div>
          <div className="nav-center">
            <a className="nav-link" href="#">Gallery</a>
            <a className="nav-link" href="#">Services</a>
            <a className="nav-link" href="#">Products</a>
            <a className="nav-link" href="#">Contact</a>
          </div>
          <div className="nav-right">
            <div className="dash-switch">
              <button className={label==='barber'?'active':''}>Barber</button>
              <button className={label==='customer'?'active':''}>Customer</button>
            </div>
            <span className="nav-link">Logout</span>
          </div>
        </nav>
        {children}
      </>
    );

    ReactDOM.createRoot(document.getElementById('barber-root')).render(
      <ToastProvider><Defs/><PrintShell label="barber"><BarberDashboard/></PrintShell></ToastProvider>
    );
    ReactDOM.createRoot(document.getElementById('customer-root')).render(
      <ToastProvider><Defs/><PrintShell label="customer"><CustomerDashboard/></PrintShell></ToastProvider>
    );

    // Auto-print after fonts + JSX + render settle
    (async () => {
      if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e){} }
      await new Promise(r => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
