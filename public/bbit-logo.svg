<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scissorsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Scissors Icon -->
  <g transform="translate(100, 35)">
    <path d="M-15,0 L-8,8 L-5,5 L-12,-2 L-15,0 Z" fill="url(#scissorsGradient)" stroke="#000" stroke-width="0.5"/>
    <path d="M15,0 L8,8 L5,5 L12,-2 L15,0 Z" fill="url(#scissorsGradient)" stroke="#000" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#000"/>
    <path d="M-8,8 L-5,5 L-2,8 L-5,11 L-8,8 Z" fill="url(#scissorsGradient)" stroke="#000" stroke-width="0.3"/>
    <path d="M8,8 L5,5 L2,8 L5,11 L8,8 Z" fill="url(#scissorsGradient)" stroke="#000" stroke-width="0.3"/>
  </g>
  
  <!-- BB Letters -->
  <g transform="translate(100, 75)">
    <!-- Left B -->
    <g transform="translate(-25, 0)">
      <path d="M-15,-20 L-15,20 L-5,20 L-5,10 L-10,10 L-10,0 L-5,0 L-5,-10 L-10,-10 L-10,-20 Z" fill="url(#textGradient)"/>
      <path d="M-5,-20 L5,-20 L5,-10 L-5,-10 Z" fill="url(#textGradient)"/>
      <path d="M-5,0 L5,0 L5,10 L-5,10 Z" fill="url(#textGradient)"/>
    </g>
    
    <!-- Right B -->
    <g transform="translate(25, 0)">
      <path d="M15,-20 L15,20 L5,20 L5,10 L10,10 L10,0 L5,0 L5,-10 L10,-10 L10,-20 Z" fill="url(#textGradient)"/>
      <path d="M5,-20 L-5,-20 L-5,-10 L5,-10 Z" fill="url(#textGradient)"/>
      <path d="M5,0 L-5,0 L-5,10 L5,10 Z" fill="url(#textGradient)"/>
    </g>
  </g>
  
  <!-- Barber Figure -->
  <g transform="translate(100, 110)">
    <!-- Head -->
    <circle cx="0" cy="-8" r="6" fill="url(#textGradient)"/>
    <!-- Body -->
    <rect x="-4" y="-2" width="8" height="12" fill="url(#textGradient)"/>
    <!-- Arms -->
    <rect x="-8" y="0" width="3" height="8" fill="url(#textGradient)"/>
    <rect x="5" y="0" width="3" height="8" fill="url(#textGradient)"/>
    <!-- Legs -->
    <rect x="-3" y="10" width="2" height="8" fill="url(#textGradient)"/>
    <rect x="1" y="10" width="2" height="8" fill="url(#textGradient)"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="url(#textGradient)">BEST BARBER IN TOWN</text>
</svg>
